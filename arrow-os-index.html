function parseAmount(raw, fb) {
  if (raw == null) return fb;
  let str = String(raw).trim().toLowerCase().replace(/[,\s]/g, "");
  if (str === "") return 0;
  let m = 1; const last = str[str.length - 1];
  if (last === "k") { m = 1e3; str = str.slice(0, -1); }
  else if (last === "m") { m = 1e6; str = str.slice(0, -1); }
  else if (last === "b") { m = 1e9; str = str.slice(0, -1); }
  const n = parseFloat(str.replace(/[^0-9.\-]/g, ""));
  return isNaN(n) ? fb : Math.round(n * m);
}
const fmt = (n) => new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(Math.round(Number(n) || 0));

/* ── portfolio math ── */
function holdingValue(key, h) {
  if (key === "etf" || key === "saudi" || key === "us") return (+h.shares || 0) * (+h.price || 0);
  if (key === "deposit") return (+h.principal || 0);
  return (+h.value || 0); // cash, other, custom
}
const typeValue = (t) => (t.holdings || []).reduce((a, h) => a + holdingValue(t.key, h), 0);
const portfolioTotal = (s) => (s.portfolio || []).reduce((a, t) => a + typeValue(t), 0);
function maturityValue(h) {
  const p = +h.principal || 0, r = (+h.rate || 0) / 100;
  if (!h.maturity) return p;
  const start = h.start ? new Date(h.start) : new Date();
  const mat = new Date(h.maturity);
  const years = Math.max(0, (mat - start) / (365.25 * 24 * 3600 * 1000));
  return Math.round(p * (1 + r * years));
}
function daysToMaturity(h) {
  if (!h.maturity) return null;
  return Math.ceil((new Date(h.maturity) - new Date()) / (24 * 3600 * 1000));
}
function stockPL(h) {
  const basis = (+h.shares || 0) * (+h.cost || 0);
  const val = (+h.shares || 0) * (+h.price || 0);
  return { basis, val, gain: val - basis, pct: basis ? ((val - basis) / basis) * 100 : 0 };
}
function newHolding(key) {
  const id = uid();
  if (key === "etf") return { id, name: "New fund", shares: 0, price: 0, div: 0, nextDiv: "" };
  if (key === "saudi" || key === "us") return { id, name: "New position", shares: 0, cost: 0, price: 0 };
  if (key === "deposit") return { id, name: "New deposit", principal: 0, rate: 0, start: "", maturity: "" };
  return { id, name: "New item", value: 0 };
}
const cashTotal = (s) => (s.portfolio || []).filter((t) => t.key === "cash").reduce((a, t) => a + typeValue(t), 0);
const calcNW = (s) => portfolioTotal(s) - s.liabilities.reduce((a, x) => a + (+x.value || 0), 0);

function deltaSince(history, days) {
  if (!history || !history.length) return null;
  const t = new Date(); t.setDate(t.getDate() - days);
  const tstr = t.toISOString().slice(0, 10);
  let base = null;
  for (const h of history) { if (h.date <= tstr) base = h; else break; }
  if (!base) return null;
  const cur = history[history.length - 1].nw;
  return { abs: cur - base.nw, pct: base.nw ? ((cur - base.nw) / base.nw) * 100 : 0 };
}
function lastDays(n) {
  const out = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    out.push({ date: d.toISOString().slice(0, 10), label: "SMTWTFS"[d.getDay()] });
  }
  return out;
}
function streak(log) {
  let n = 0; const d = new Date();
  for (;;) { const k = d.toISOString().slice(0, 10); if (log && log[k]) { n++; d.setDate(d.getDate() - 1); } else break; }
  return n;
}

function Spark({ data, color }) {
  if (!data || data.length < 2) return null;
  const w = 300, h = 44, pad = 4;
  const ys = data.map((d) => d.nw), min = Math.min(...ys), max = Math.max(...ys), r = max - min || 1;
  const pt = (d, i) => [pad + (i / (data.length - 1)) * (w - 2 * pad), pad + (1 - (d.nw - min) / r) * (h - 2 * pad)];
  const line = data.map((d, i) => pt(d, i).join(",")).join(" ");
  const [lx, ly] = pt(data[data.length - 1], data.length - 1);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none" style={{ display: "block" }}>
      <polyline points={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={lx} cy={ly} r="2.4" fill={color} />
    </svg>
  );
}

  }

  const cash = cashTotal(s);
  const runway = s.burn > 0 ? cash / s.burn : null;
  const delta = sessionBase.current == null ? 0 : nw - sessionBase.current;
  const pct = sessionBase.current ? (delta / sessionBase.current) * 100 : 0;
  const d1w = deltaSince(s.history, 7), d1m = deltaSince(s.history, 30);
  const bizRev = s.businesses.reduce((a, b) => a + (+b.revenue || 0), 0);
  const bizProfit = s.businesses.reduce((a, b) => a + (+b.profit || 0), 0);
  const bizInvested = s.businesses.reduce((a, b) => a + (+b.invested || 0), 0);
  const openTodosTotal = s.businesses.reduce((a, b) => a + (b.todos || []).filter((t) => !t.done).length, 0);
  const profitShareTotal = s.businesses.reduce((a, b) => a + (+b.profit || 0) * (+b.ownership || 0) / 100, 0);
  const habitsToday = s.habits.filter((h) => h.log && h.log[todayStr()]).length;
  const dueCount = s.reminders.filter((r) => !r.done && r.due && r.due <= todayStr()).length;
  const levelColor = (lv) => (lv === "risk" ? C.down : lv === "good" ? C.up : C.gold);

  const hr = now.current.getHours();
  const greeting = hr < 12 ? "Good morning." : hr < 18 ? "Good afternoon." : "Good evening.";
  const dateStr = now.current.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });

  const upd = (key, id, field, val) => patch((d) => { d[key] = d[key].map((x) => x.id === id ? { ...x, [field]: val } : x); return d; });
  const del = (key, id) => patch((d) => { d[key] = d[key].filter((x) => x.id !== id); return d; });
  const updKpi = (bid, kid, field, val) => patch((d) => { d.businesses = d.businesses.map((x) => x.id === bid ? { ...x, kpis: x.kpis.map((y) => y.id === kid ? { ...y, [field]: val } : y) } : x); return d; });
  const updTodo = (bid, tid, field, val) => patch((d) => { d.businesses = d.businesses.map((x) => x.id === bid ? { ...x, todos: (x.todos || []).map((y) => y.id === tid ? { ...y, [field]: val } : y) } : x); return d; });
  const delTodo = (bid, tid) => patch((d) => { d.businesses = d.businesses.map((x) => x.id === bid ? { ...x, todos: (x.todos || []).filter((y) => y.id !== tid) } : x); return d; });
  const addTodo = (bid) => { const id = uid(); setAutoEditId(id); patch((d) => { d.businesses = d.businesses.map((x) => x.id === bid ? { ...x, todos: [...(x.todos || []), { id, text: "", done: false }] } : x); return d; }); };

  const updType = (tid, field, val) => patch((d) => { d.portfolio = d.portfolio.map((t) => t.id === tid ? { ...t, [field]: val } : t); return d; });
  const delType = (tid) => patch((d) => { d.portfolio = d.portfolio.filter((t) => t.id !== tid); return d; });
  const updHolding = (tid, hid, field, val) => patch((d) => { d.portfolio = d.portfolio.map((t) => t.id === tid ? { ...t, holdings: t.holdings.map((h) => h.id === hid ? { ...h, [field]: val } : h) } : t); return d; });
  const delHolding = (tid, hid) => patch((d) => { d.portfolio = d.portfolio.map((t) => t.id === tid ? { ...t, holdings: t.holdings.filter((h) => h.id !== hid) } : t); return d; });
  const addHolding = (tid, key) => { const h = newHolding(key); setAutoEditId(h.id); patch((d) => { d.portfolio = d.portfolio.map((t) => t.id === tid ? { ...t, holdings: [...t.holdings, h] } : t); return d; }); };
  const addPriority = () => { const id = uid(); setAutoEditId(id); patch((d) => { d.priorities = [...d.priorities, { id, text: "", done: false }]; return d; }); };
  const addAlert = () => { const id = uid(); setAutoEditId(id); patch((d) => { d.alerts = [...d.alerts, { id, kind: "risk", text: "" }]; return d; }); };
  const addReminder = () => { const id = uid(); setAutoEditId(id); patch((d) => { d.reminders = [...d.reminders, { id, text: "", due: null, done: false }]; return d; }); };

  if (!loaded) return <div style={{ background: C.bg, minHeight: "100vh", display: "grid", placeItems: "center" }}>
    <span style={{ color: C.goldDim, fontFamily: FM, letterSpacing: "0.3em" }}>◆ ARROW OS</span></div>;

  const briefStale = s.brief && s.brief.nw !== nw;

  /* ── HOME ── */
  const renderHome = () => (
    <>
      <Card title="Morning Brief" delay={20} style={{ background: "linear-gradient(180deg,#161B24,#131822)", marginBottom: 14 }}
        right={<button onClick={generateBrief} disabled={briefLoading} className="flex items-center gap-1.5 text-xs"
          style={{ color: C.gold, background: "none", border: `1px solid ${C.line}`, borderRadius: 7, padding: "3px 9px", fontFamily: FS }}>
          <Icon name="refresh-cw" size={12} className={briefLoading ? "aos-spin" : ""} /> {briefLoading ? "Reading…" : "Refresh"}</button>}>
        <div className="flex items-center gap-2 mb-3" style={{ color: C.gold }}><Icon name="sparkles" size={15} />
          <span style={{ fontSize: 13, color: C.dim }}>What deserves your attention</span></div>
        {briefLoading && !s.brief && <p className="aos-pulse" style={{ color: C.dim, fontSize: 14 }}>Reading your position…</p>}
        {briefErr && !briefLoading && <p style={{ color: C.down, fontSize: 13 }}>{briefErr}</p>}
        {s.brief && (
          <>
            <BriefItems items={s.brief.items} levelColor={levelColor} />
            <div style={{ color: C.faint, fontSize: 11, marginTop: 8 }}>
              {briefStale ? "Numbers changed — refresh to update." : `Generated ${new Date(s.brief.at).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}`}</div>
          </>
        )}
      </Card>

      <Card title="Net Worth" delay={50} style={{ marginBottom: 14 }}>
        <Num value={nw} size="hero" bold prefix={s.currency} />
        <div className="flex items-center gap-4 flex-wrap mt-3">
          {delta === 0 ? <span style={{ color: C.faint, fontSize: 12 }}>· No change since you last opened</span> :
            <span className="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1"
              style={{ color: delta > 0 ? C.up : C.down, background: (delta > 0 ? C.up : C.down) + "1A", fontFamily: FM, fontSize: 12 }}>
              {delta > 0 ? <Icon name="arrow-up-right" size={13} /> : <Icon name="arrow-down-right" size={13} />}{delta > 0 ? "+" : "−"}{fmt(Math.abs(delta))} ({Math.abs(pct).toFixed(1)}%) since open</span>}
          <Pill label="1W" d={d1w} /><Pill label="1M" d={d1m} />
        </div>
        {s.history && s.history.length >= 2 && <div className="mt-4"><Spark data={s.history} color={C.gold} /></div>}
      </Card>

      <div className="grid grid-cols-2 gap-3 mb-3">
        <Card delay={70} style={{ padding: 16 }}><Stat label="Cash" value={`${s.currency} ${fmt(cash)}`} sub={runway == null ? "—" : `${runway.toFixed(1)} mo runway`} tone={runway != null && runway < 6 ? C.down : C.text} /></Card>
        <Card delay={80} style={{ padding: 16 }}><Stat label="Businesses" value={`${s.currency} ${fmt(bizRev)}`} sub={`${s.businesses.length} co · ${fmt(bizProfit)} profit`} /></Card>
        <Card delay={90} style={{ padding: 16 }}><Stat label="Habits today" value={`${habitsToday}/${s.habits.length}`} sub="done" tone={C.up} /></Card>
        <Card delay={100} style={{ padding: 16 }}><Stat label="Reminders" value={`${dueCount}`} sub="due or overdue" tone={dueCount ? C.down : C.text} /></Card>
      </div>

      <Card title="Today's Priorities" delay={120} style={{ marginBottom: 14 }}>
        {s.priorities.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>Nothing set. Add today's first priority.</p>}
        <div className="flex flex-col gap-2">
          {s.priorities.map((p) => (
            <div key={p.id} className="group flex items-start gap-2.5">
              <button onClick={() => upd("priorities", p.id, "done", !p.done)} className="mt-0.5 shrink-0 rounded"
                style={{ width: 16, height: 16, border: `1.5px solid ${p.done ? C.up : C.line}`, background: p.done ? C.up + "22" : "transparent", display: "grid", placeItems: "center", padding: 0 }}>
                {p.done && <Icon name="check" size={11} color={C.up} />}</button>
              <div className="flex-1 min-w-0"><EditText value={p.text} strike={p.done} autoEdit={autoEditId === p.id} onEnter={addPriority}
                onCommit={(v) => upd("priorities", p.id, "text", v)} placeholder="Priority" /></div>
              <Kill onClick={() => del("priorities", p.id)} />
            </div>
          ))}
        </div>
        <AddRow label="Add priority" onClick={addPriority} />
      </Card>

      <Card title="Alerts" delay={140}>
        {s.alerts.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No flags. You're clear.</p>}
        <div className="flex flex-col gap-2.5">
          {s.alerts.map((al) => (
            <div key={al.id} className="group flex items-start gap-2.5">
              <button onClick={() => upd("alerts", al.id, "kind", al.kind === "risk" ? "opp" : "risk")} className="mt-0.5 shrink-0"
                style={{ color: al.kind === "risk" ? C.down : C.up, background: "none", border: "none", lineHeight: 0, padding: 0 }}
                title={al.kind === "risk" ? "Risk — tap to flip" : "Opportunity — tap to flip"}>
                {al.kind === "risk" ? <Icon name="triangle-alert" size={15} /> : <Icon name="sparkles" size={15} />}</button>
              <div className="flex-1 min-w-0"><EditText value={al.text} autoEdit={autoEditId === al.id} onEnter={addAlert}
                onCommit={(v) => upd("alerts", al.id, "text", v)} placeholder="Alert" /></div>
              <Kill onClick={() => del("alerts", al.id)} />
            </div>
          ))}
        </div>
        <AddRow label="Add alert" onClick={addAlert} />
      </Card>
    </>
  );

  /* ── PORTFOLIO ── */
  const pTotal = portfolioTotal(s);
  const openType = portfolioView ? s.portfolio.find((t) => t.id === portfolioView) : null;
  const money = (v) => `${s.currency} ${fmt(v)}`;

  const renderHolding = (t, h) => {
    if (t.key === "etf") {
      const val = (+h.shares || 0) * (+h.price || 0);
      const income = (+h.shares || 0) * (+h.div || 0);
      return (
        <Card key={h.id} style={{ marginBottom: 10 }} right={<Kill onClick={() => delHolding(t.id, h.id)} />}
          title={<EditText value={h.name} onCommit={(v) => updHolding(t.id, h.id, "name", v)} placeholder="Fund name" style={{ fontSize: 13, color: C.text }} />}>
          <div className="flex items-baseline justify-between mb-3">
            <span style={{ color: C.dim, fontSize: 12 }}>Value</span>
            <span style={{ fontFamily: FM, fontSize: 18, fontWeight: 600 }}>{money(val)}</span></div>
          <div className="grid grid-cols-2 gap-x-4 gap-y-3">
            <Fact label="Shares"><Num value={h.shares} onCommit={(v) => updHolding(t.id, h.id, "shares", v)} full /></Fact>
            <Fact label="Price"><Num value={h.price} onCommit={(v) => updHolding(t.id, h.id, "price", v)} full /></Fact>
            <Fact label="Dividend / share"><Num value={h.div} onCommit={(v) => updHolding(t.id, h.id, "div", v)} full /></Fact>
            <Fact label="Next dividend"><DateField value={h.nextDiv} onChange={(v) => updHolding(t.id, h.id, "nextDiv", v)} /></Fact>
          </div>
          <div className="mt-3 pt-2" style={{ borderTop: `1px solid ${C.lineSoft}`, color: C.dim, fontSize: 12 }}>
            Est. annual dividend <span style={{ color: C.up, fontFamily: FM }}>{money(income)}</span></div>
        </Card>
      );
    }
    if (t.key === "saudi" || t.key === "us") {
      const { basis, val, gain, pct } = stockPL(h);
      return (
        <Card key={h.id} style={{ marginBottom: 10 }} right={<Kill onClick={() => delHolding(t.id, h.id)} />}
          title={<EditText value={h.name} onCommit={(v) => updHolding(t.id, h.id, "name", v)} placeholder="Company" style={{ fontSize: 13, color: C.text }} />}>
          <div className="flex items-baseline justify-between mb-3">
            <span style={{ color: C.dim, fontSize: 12 }}>Value now</span>
            <span style={{ fontFamily: FM, fontSize: 18, fontWeight: 600 }}>{money(val)}</span></div>
          <div className="grid grid-cols-3 gap-x-4 gap-y-3">
            <Fact label="Shares"><Num value={h.shares} onCommit={(v) => updHolding(t.id, h.id, "shares", v)} full /></Fact>
            <Fact label="Avg cost"><Num value={h.cost} onCommit={(v) => updHolding(t.id, h.id, "cost", v)} full /></Fact>
            <Fact label="Price now"><Num value={h.price} onCommit={(v) => updHolding(t.id, h.id, "price", v)} full /></Fact>
          </div>
          <div className="mt-3 pt-2 flex items-center justify-between" style={{ borderTop: `1px solid ${C.lineSoft}`, fontSize: 12 }}>
            <span style={{ color: C.dim }}>Cost {money(basis)}</span>
            <span style={{ color: gain >= 0 ? C.up : C.down, fontFamily: FM }}>{gain >= 0 ? "+" : "−"}{money(Math.abs(gain))} ({Math.abs(pct).toFixed(1)}%)</span>
          </div>
        </Card>
      );
    }
    if (t.key === "deposit") {
      const mv = maturityValue(h), days = daysToMaturity(h), earn = mv - (+h.principal || 0);
      return (
        <Card key={h.id} style={{ marginBottom: 10 }} right={<Kill onClick={() => delHolding(t.id, h.id)} />}
          title={<EditText value={h.name} onCommit={(v) => updHolding(t.id, h.id, "name", v)} placeholder="Deposit / bank" style={{ fontSize: 13, color: C.text }} />}>
          <div className="flex items-baseline justify-between mb-3">
            <span style={{ color: C.dim, fontSize: 12 }}>Value now</span>
            <span style={{ fontFamily: FM, fontSize: 18, fontWeight: 600 }}>{money(+h.principal || 0)}</span></div>
          <div className="grid grid-cols-2 gap-x-4 gap-y-3">
            <Fact label="Principal"><Num value={h.principal} onCommit={(v) => updHolding(t.id, h.id, "principal", v)} full /></Fact>
            <Fact label="Rate % / yr"><Num value={h.rate} onCommit={(v) => updHolding(t.id, h.id, "rate", v)} full /></Fact>
            <Fact label="Start"><DateField value={h.start} onChange={(v) => updHolding(t.id, h.id, "start", v)} /></Fact>
            <Fact label="Maturity"><DateField value={h.maturity} onChange={(v) => updHolding(t.id, h.id, "maturity", v)} /></Fact>
          </div>
          <div className="mt-3 pt-2" style={{ borderTop: `1px solid ${C.lineSoft}` }}>
            <div className="flex items-center justify-between" style={{ fontSize: 12 }}>
              <span style={{ color: C.dim }}>Value at maturity</span>
              <span style={{ color: C.gold, fontFamily: FM, fontWeight: 600 }}>{money(mv)}</span></div>
            <div className="flex items-center justify-between mt-1" style={{ fontSize: 12, color: C.faint }}>
              <span>Interest {money(earn)}</span>
              <span>{days == null ? "set maturity date" : days >= 0 ? `${days} days to go` : "matured"}</span></div>
          </div>
        </Card>
      );
    }
    return (
      <Card key={h.id} style={{ marginBottom: 10 }} right={<Kill onClick={() => delHolding(t.id, h.id)} />}
        title={<EditText value={h.name} onCommit={(v) => updHolding(t.id, h.id, "name", v)} placeholder="Name" style={{ fontSize: 13, color: C.text }} />}>
        <div className="flex items-baseline justify-between">
          <span style={{ color: C.dim, fontSize: 12 }}>Value</span>
          <Num value={h.value} onCommit={(v) => updHolding(t.id, h.id, "value", v)} prefix={s.currency} size="md" /></div>
      </Card>
    );
  };

  const renderTypeDetail = (t) => {
    const tv = typeValue(t);
    const income = t.key === "etf" ? t.holdings.reduce((a, h) => a + (+h.shares || 0) * (+h.div || 0), 0) : null;
    const matSum = t.key === "deposit" ? t.holdings.reduce((a, h) => a + maturityValue(h), 0) : null;
    return (
      <>
        <button onClick={() => setPortfolioView(null)} className="flex items-center gap-1 mb-3"
          style={{ color: C.gold, background: "none", border: "none", fontFamily: FS, fontSize: 13 }}>
          <Icon name="chevron-left" size={16} /> Portfolio</button>
        <Card delay={20} style={{ marginBottom: 14 }} right={<Kill onClick={() => { delType(t.id); setPortfolioView(null); }} />}
          title={<EditText value={t.name} onCommit={(v) => updType(t.id, "name", v)} placeholder="Type name" style={{ fontSize: 13, color: C.text }} />}>
          <div className="flex items-baseline justify-between">
            <span style={{ color: C.dim, fontSize: 12 }}>{t.holdings.length} holding{t.holdings.length === 1 ? "" : "s"}</span>
            <Num value={tv} size="hero" bold prefix={s.currency} /></div>
          {income != null && <div className="mt-2" style={{ color: C.dim, fontSize: 12 }}>Est. annual dividends <span style={{ color: C.up, fontFamily: FM }}>{money(income)}</span></div>}
          {matSum != null && <div className="mt-2" style={{ color: C.dim, fontSize: 12 }}>Total value at maturity <span style={{ color: C.gold, fontFamily: FM }}>{money(matSum)}</span></div>}
        </Card>
        {t.holdings.length === 0 && <p style={{ color: C.faint, fontSize: 13, marginBottom: 10 }}>No holdings yet.</p>}
        {t.holdings.map((h) => renderHolding(t, h))}
        <button onClick={() => addHolding(t.id, t.key)} className="w-full flex items-center justify-center gap-2 rounded-2xl py-3"
          style={{ color: C.gold, background: "none", border: `1px dashed ${C.line}`, fontFamily: FS, fontSize: 13 }}>
          <Icon name="plus" size={15} /> Add holding</button>
      </>
    );
  };

  const renderPortfolio = () => {
    if (openType) return renderTypeDetail(openType);
    return (
      <>
        <Card title="Net Worth" delay={20} style={{ marginBottom: 14 }}
          right={<button onClick={() => { const c = prompt("Currency code", s.currency); if (c) patch((d) => { d.currency = c.toUpperCase().slice(0, 4); return d; }); }}
            style={{ color: C.faint, background: "none", border: `1px solid ${C.line}`, borderRadius: 6, padding: "2px 8px", fontFamily: FM, fontSize: 11 }}>{s.currency}</button>}>
          <Num value={nw} size="hero" bold prefix={s.currency} />
          <div className="flex items-center gap-4 flex-wrap mt-3">
            {delta === 0 ? <span style={{ color: C.faint, fontSize: 12 }}>· No change since open</span> :
              <span className="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1" style={{ color: delta > 0 ? C.up : C.down, background: (delta > 0 ? C.up : C.down) + "1A", fontFamily: FM, fontSize: 12 }}>
                {delta > 0 ? <Icon name="arrow-up-right" size={13} /> : <Icon name="arrow-down-right" size={13} />}{delta > 0 ? "+" : "−"}{fmt(Math.abs(delta))} ({Math.abs(pct).toFixed(1)}%)</span>}
            <Pill label="1W" d={d1w} /><Pill label="1M" d={d1m} />
          </div>
          {s.history && s.history.length >= 2 && <div className="mt-4"><Spark data={s.history} color={C.gold} /></div>}
        </Card>

        <Card title="Holdings by type" delay={50} style={{ marginBottom: 14 }}>
          {s.portfolio.map((t) => {
            const tv = typeValue(t), p = pTotal ? (tv / pTotal) * 100 : 0;
            return (
              <button key={t.id} onClick={() => setPortfolioView(t.id)} className="w-full text-left py-2.5"
                style={{ background: "none", border: "none", borderBottom: `1px solid ${C.lineSoft}`, display: "block" }}>
                <div className="flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div style={{ color: C.text, fontSize: 14 }}>{t.name}</div>
                    <div style={{ color: C.faint, fontSize: 11 }}>{t.holdings.length} holding{t.holdings.length === 1 ? "" : "s"}</div>
                  </div>
                  <span style={{ color: C.faint, fontFamily: FM, fontSize: 11, width: 32, textAlign: "right" }}>{p.toFixed(0)}%</span>
                  <span style={{ fontFamily: FM, fontSize: 14, minWidth: 88, textAlign: "right" }}>{money(tv)}</span>
                  <Icon name="chevron-right" size={16} style={{ color: C.gold }} />
                </div>
                <div style={{ height: 3, background: C.lineSoft, borderRadius: 3, marginTop: 8 }}>
                  <div style={{ width: `${p}%`, height: "100%", background: C.gold, borderRadius: 3 }} /></div>
              </button>
            );
          })}
          <button onClick={() => { const t = { id: uid(), key: "other", name: "New type", holdings: [] }; patch((d) => { d.portfolio = [...d.portfolio, t]; return d; }); setPortfolioView(t.id); }}
            className="flex items-center gap-1.5 mt-3 text-xs" style={{ color: C.gold, background: "none", border: "none", fontFamily: FS }}>
            <Icon name="plus" size={13} /> Add type</button>
        </Card>

        <Card title="Liabilities" delay={70} style={{ marginBottom: 14 }}>
          {s.liabilities.map((a) => (
            <Row key={a.id}>
              <div className="flex-1 min-w-0"><EditText value={a.label} onCommit={(v) => upd("liabilities", a.id, "label", v)} placeholder="Label" /></div>
              <Num value={a.value} onCommit={(v) => upd("liabilities", a.id, "value", v)} prefix={s.currency} />
              <Kill onClick={() => del("liabilities", a.id)} />
            </Row>
          ))}
          <AddRow label="Add liability" onClick={() => patch((d) => { d.liabilities = [...d.liabilities, { id: uid(), label: "New liability", value: 0 }]; return d; })} />
          <div className="flex items-center justify-between mt-4 pt-3" style={{ borderTop: `1px solid ${C.gold}44` }}>
            <span style={{ color: C.gold, fontSize: 12, letterSpacing: "0.14em", textTransform: "uppercase" }}>Net worth</span>
            <span style={{ fontFamily: FM, fontWeight: 600, fontSize: 18 }}><span style={{ color: C.faint, fontSize: "0.7em", marginRight: 4 }}>{s.currency}</span>{fmt(nw)}</span></div>
        </Card>

        <Card title="Cash Position" delay={90}>
          <div className="flex items-baseline justify-between">
            <span style={{ color: C.dim, fontSize: 13 }}>Available</span>
            <span style={{ fontFamily: FM, fontSize: 22, fontWeight: 600 }}><span style={{ color: C.faint, fontSize: "0.6em", marginRight: 4 }}>{s.currency}</span>{fmt(cash)}</span></div>
          <div className="flex items-center justify-between mt-3 py-1.5" style={{ borderTop: `1px solid ${C.lineSoft}` }}>
            <span style={{ color: C.dim, fontSize: 13 }}>Monthly burn</span>
            <Num value={s.burn} onCommit={(v) => patch((d) => { d.burn = v; return d; })} prefix={s.currency} /></div>
          <div className="flex items-center justify-between mt-1">
            <span style={{ color: C.dim, fontSize: 13 }}>Runway</span>
            <span style={{ fontFamily: FM, fontSize: 14, color: runway == null ? C.faint : runway < 6 ? C.down : C.up }}>{runway == null ? "—" : `${runway.toFixed(1)} mo`}</span></div>
        </Card>
      </>
    );
  };

  /* ── BUSINESS ── */
  const renderBusiness = () => (
    <>
      <div className="grid grid-cols-3 gap-3 mb-3">
        <Card delay={20} style={{ padding: 14 }}><Stat label="Open to-dos" value={`${openTodosTotal}`} sub={`${s.businesses.length} companies`} tone={openTodosTotal ? C.text : C.up} /></Card>
        <Card delay={30} style={{ padding: 14 }}><Stat label="Invested" value={fmt(bizInvested)} sub={bizInvested ? `${((bizProfit / bizInvested) * 100).toFixed(0)}% ROI` : "—"} tone={C.gold} /></Card>
        <Card delay={40} style={{ padding: 14 }}><Stat label="Profit share" value={fmt(profitShareTotal)} sub="your economic take" tone={C.up} /></Card>
      </div>
      {s.businesses.map((b, bi) => {
        const roi = b.invested ? (b.profit / b.invested) * 100 : null;
        const share = (+b.profit || 0) * (+b.ownership || 0) / 100;
        return (
          <Card key={b.id} delay={50 + bi * 20} style={{ marginBottom: 14 }}
            right={<span className="flex items-center gap-2">
              <span style={{ color: C.gold, fontSize: 11, fontFamily: FM, border: `1px solid ${C.line}`, borderRadius: 999, padding: "2px 8px" }}>{b.ownership || 0}% stake</span>
              <Kill onClick={() => del("businesses", b.id)} />
            </span>}
            title={<EditText value={b.name} onCommit={(v) => upd("businesses", b.id, "name", v)} placeholder="Company name" style={{ fontSize: 13, letterSpacing: "0.04em", color: C.text }} />}>
            {/* To-do — the focus of each company */}
            <div className="mb-4">
              <div className="flex items-center justify-between mb-2">
                <span style={{ color: C.dim, fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase" }}>To-do</span>
                <span style={{ color: C.faint, fontSize: 11, fontFamily: FM }}>{(b.todos || []).filter((t) => !t.done).length} open</span>
              </div>
              {(b.todos || []).length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No tasks yet. Add the first.</p>}
              <div className="flex flex-col gap-2">
                {(b.todos || []).map((t) => (
                  <div key={t.id} className="group flex items-start gap-2.5">
                    <button onClick={() => updTodo(b.id, t.id, "done", !t.done)} className="mt-0.5 shrink-0 rounded"
                      style={{ width: 16, height: 16, border: `1.5px solid ${t.done ? C.up : C.line}`, background: t.done ? C.up + "22" : "transparent", display: "grid", placeItems: "center", padding: 0 }}>
                      {t.done && <Icon name="check" size={11} color={C.up} />}</button>
                    <div className="flex-1 min-w-0"><EditText value={t.text} strike={t.done} autoEdit={autoEditId === t.id} onEnter={() => addTodo(b.id)}
                      onCommit={(v) => updTodo(b.id, t.id, "text", v)} placeholder="Task" /></div>
                    <Kill onClick={() => delTodo(b.id, t.id)} />
                  </div>
                ))}
              </div>
              <AddRow label="Add task" onClick={() => addTodo(b.id)} />
            </div>

            {/* Facts — kept compact and secondary */}
            <div className="grid grid-cols-2 gap-x-4 gap-y-3 mb-4 pt-3" style={{ borderTop: `1px solid ${C.lineSoft}` }}>
              <Fact label="Last stated revenue"><Num value={b.revenue} onCommit={(v) => upd("businesses", b.id, "revenue", v)} full /></Fact>
              <Fact label="Ownership %"><Num value={b.ownership} onCommit={(v) => upd("businesses", b.id, "ownership", v)} full /></Fact>
              <Fact label="Profit"><Num value={b.profit} onCommit={(v) => upd("businesses", b.id, "profit", v)} tone={C.up} full /></Fact>
              <Fact label="Capital invested"><Num value={b.invested} onCommit={(v) => upd("businesses", b.id, "invested", v)} full /></Fact>
              <Fact label="Cash on hand"><Num value={b.cash} onCommit={(v) => upd("businesses", b.id, "cash", v)} full /></Fact>
              <Fact label="Return on invested"><span style={{ fontFamily: FM, fontSize: 14, color: roi == null ? C.faint : roi >= 0 ? C.gold : C.down }}>{roi == null ? "—" : `${roi.toFixed(1)}%`}</span></Fact>
              <Fact label={`Your share (${b.ownership || 0}%)`}><span style={{ fontFamily: FM, fontSize: 14, color: C.up }}>{fmt(share)}</span></Fact>
            </div>

            {/* Per-company brief */}
            <div className="rounded-xl p-3 mb-4" style={{ background: "#10151D", border: `1px solid ${C.lineSoft}` }}>
              <div className="flex items-center justify-between mb-2">
                <span className="inline-flex items-center gap-1.5" style={{ color: C.gold, fontSize: 12 }}><Icon name="sparkles" size={13} /> Company brief</span>
                <button onClick={() => companyBrief(b)} disabled={coLoading === b.id} className="flex items-center gap-1.5 text-xs"
                  style={{ color: C.gold, background: "none", border: `1px solid ${C.line}`, borderRadius: 7, padding: "3px 9px", fontFamily: FS }}>
                  <Icon name="refresh-cw" size={11} className={coLoading === b.id ? "aos-spin" : ""} /> {coLoading === b.id ? "Analyzing…" : b.brief ? "Refresh" : "Analyze"}</button>
              </div>
              {coLoading === b.id && !b.brief && <p className="aos-pulse" style={{ color: C.dim, fontSize: 13 }}>Reading this company…</p>}
              {b.brief && b.brief.error && <p style={{ color: C.down, fontSize: 13 }}>Couldn't analyze. Tap Analyze to retry.</p>}
              {b.brief && b.brief.items && <BriefItems items={b.brief.items} levelColor={levelColor} />}
              {!b.brief && coLoading !== b.id && <p style={{ color: C.faint, fontSize: 13 }}>Tap Analyze for a read on your return, cash, and whether the to-dos are the right priorities.</p>}
            </div>

            <div style={{ color: C.dim, fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 4 }}>KPIs</div>
            {b.kpis.map((k) => (
              <div key={k.id} className="group flex items-center gap-3 py-1.5" style={{ borderBottom: `1px solid ${C.lineSoft}` }}>
                <div className="flex-1 min-w-0"><EditText value={k.label} onCommit={(v) => updKpi(b.id, k.id, "label", v)} placeholder="KPI" /></div>
                <div style={{ width: 46 }}><EditText value={k.unit} onCommit={(v) => updKpi(b.id, k.id, "unit", v)} placeholder="unit" style={{ color: C.faint, fontSize: 11, fontFamily: FM }} /></div>
                <Num value={k.value} onCommit={(v) => updKpi(b.id, k.id, "value", v)} />
                <Kill onClick={() => patch((d) => { d.businesses = d.businesses.map((x) => x.id === b.id ? { ...x, kpis: x.kpis.filter((y) => y.id !== k.id) } : x); return d; })} />
              </div>
            ))}
            <AddRow label="Add KPI" onClick={() => patch((d) => { d.businesses = d.businesses.map((x) => x.id === b.id ? { ...x, kpis: [...x.kpis, { id: uid(), label: "New KPI", value: 0, unit: "" }] } : x); return d; })} />
          </Card>
        );
      })}
      <button onClick={() => patch((d) => { d.businesses = [...d.businesses, { id: uid(), name: "New company", ownership: 100, revenue: 0, profit: 0, cash: 0, invested: 0, todos: [], kpis: [], brief: null }]; return d; })}
        className="w-full flex items-center justify-center gap-2 rounded-2xl py-3"
        style={{ color: C.gold, background: "none", border: `1px dashed ${C.line}`, fontFamily: FS, fontSize: 13 }}><Icon name="plus" size={15} /> Add company</button>
    </>
  );

  /* ── HABITS ── */
  const week = lastDays(7);
  const renderHabits = () => (
    <Card title="Daily Habits" delay={20}>
      {s.habits.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>No habits yet. Add one to start a streak.</p>}
      <div className="flex flex-col gap-4">
        {s.habits.map((h) => (
          <div key={h.id} className="group">
            <div className="flex items-center gap-3 mb-2">
              <div className="flex-1 min-w-0"><EditText value={h.name} onCommit={(v) => upd("habits", h.id, "name", v)} placeholder="Habit" /></div>
              <span className="inline-flex items-center gap-1" style={{ color: streak(h.log) ? C.gold : C.faint, fontFamily: FM, fontSize: 12 }}><Icon name="flame" size={13} /> {streak(h.log)}</span>
              <Kill onClick={() => del("habits", h.id)} />
            </div>
            <div className="flex gap-2">
              {week.map((d) => {
                const on = h.log && h.log[d.date];
                return (
                  <button key={d.date} onClick={() => patch((D) => { D.habits = D.habits.map((x) => { if (x.id !== h.id) return x; const log = { ...(x.log || {}) }; if (log[d.date]) delete log[d.date]; else log[d.date] = true; return { ...x, log }; }); return D; })}
                    className="flex-1 flex flex-col items-center gap-1" style={{ background: "none", border: "none", padding: 0 }}>
                    <span style={{ color: C.faint, fontSize: 10, fontFamily: FM }}>{d.label}</span>
                    <span style={{ width: "100%", height: 26, borderRadius: 7, background: on ? C.up : C.lineSoft, border: `1px solid ${on ? C.up : C.line}`, display: "grid", placeItems: "center" }}>
                      {on && <Icon name="check" size={13} color="#0C0F14" />}</span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <AddRow label="Add habit" onClick={() => patch((d) => { const id = uid(); setAutoEditId(id); d.habits = [...d.habits, { id, name: "", log: {} }]; return d; })} />
    </Card>
  );

  /* ── REMINDERS ── */
  const sortedReminders = [...s.reminders].sort((a, b) => (a.done - b.done) || ((a.due || "9999") < (b.due || "9999") ? -1 : 1));
  const renderReminders = () => (
    <Card title="Reminders" delay={20}>
      {s.reminders.length === 0 && <p style={{ color: C.faint, fontSize: 13 }}>Nothing to remember yet. Add a follow-up.</p>}
      <div className="flex flex-col gap-3">
        {sortedReminders.map((r) => {
          const overdue = r.due && !r.done && r.due <= todayStr();
          return (
            <div key={r.id} className="group flex items-start gap-2.5">
              <button onClick={() => upd("reminders", r.id, "done", !r.done)} className="mt-0.5 shrink-0 rounded"
                style={{ width: 16, height: 16, border: `1.5px solid ${r.done ? C.up : C.line}`, background: r.done ? C.up + "22" : "transparent", display: "grid", placeItems: "center", padding: 0 }}>
                {r.done && <Icon name="check" size={11} color={C.up} />}</button>
              <div className="flex-1 min-w-0">
                <EditText value={r.text} strike={r.done} autoEdit={autoEditId === r.id} onEnter={addReminder}
                  onCommit={(v) => upd("reminders", r.id, "text", v)} placeholder="Reminder" />
                <input type="date" value={r.due || ""} onChange={(e) => upd("reminders", r.id, "due", e.target.value || null)}
                  className="mt-1 bg-transparent outline-none" style={{ color: overdue ? C.down : C.faint, fontSize: 11, fontFamily: FM, border: "none", colorScheme: "dark" }} />
              </div>
              <Kill onClick={() => del("reminders", r.id)} />
            </div>
          );
        })}
      </div>
      <AddRow label="Add reminder" onClick={addReminder} />
    </Card>
  );

  const tabs = [
    { id: "home", label: "Home", icon: "layout-grid" },
    { id: "business", label: "Business", icon: "building-2" },
    { id: "portfolio", label: "Portfolio", icon: "pie-chart" },
    { id: "habits", label: "Habits", icon: "flame" },
    { id: "reminders", label: "Reminders", icon: "bell" },
  ];
  const titles = { home: greeting, business: "Business", portfolio: "Portfolio", habits: "Habits", reminders: "Reminders" };

  const notifLabel = notifPerm === "granted" ? "Alerts on" : notifPerm === "denied" ? "Alerts blocked" : notifPerm === "unsupported" ? "Alerts n/a" : "Enable alerts";

  return (
    <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FS, color: C.text }}>
      <style>{`
        .aos-rise { animation: aosRise .5s cubic-bezier(.2,.7,.2,1) both; }
        @keyframes aosRise { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:none;} }
        .aos-spin { animation: aosSpin 1s linear infinite; } @keyframes aosSpin { to {transform:rotate(360deg);} }
        .aos-pulse { animation: aosPulse 1.4s ease-in-out infinite; } @keyframes aosPulse {0%,100%{opacity:.4}50%{opacity:1}}
        button:focus-visible, input:focus-visible { outline:2px solid ${C.gold}; outline-offset:2px; border-radius:3px; }
        @media (prefers-reduced-motion: reduce){ *{animation:none!important; transition:none!important;} }
        input::placeholder{ color:${C.faint}; }
      `}</style>

      <div className="mx-auto px-5 pt-8" style={{ maxWidth: 1040, paddingBottom: 96 }}>
        <header className="flex items-start justify-between mb-6 aos-rise">
          <div>
            <div className="flex items-center gap-2" style={{ color: C.gold }}>
              <span style={{ fontSize: 13 }}>◆</span><span style={{ fontFamily: FM, letterSpacing: "0.28em", fontSize: 12 }}>ARROW OS</span></div>
            <h1 className="mt-2" style={{ fontSize: 26, fontWeight: 500, letterSpacing: "-0.01em" }}>{titles[tab]}</h1>
          </div>
          <div className="flex flex-col items-end gap-2">
            <div style={{ color: C.dim, fontSize: 13 }}>{dateStr}</div>
            <button onClick={setApiKey} className="inline-flex items-center gap-1.5" style={{ color: hasKey ? C.up : C.gold, background: "none", border: `1px solid ${C.line}`, borderRadius: 999, padding: "3px 10px", fontFamily: FS, fontSize: 11 }}><Icon name="sparkles" size={12} /> {hasKey ? "AI key set" : "Add AI key"}</button>
            <button onClick={enableNotifs} disabled={notifPerm === "granted" || notifPerm === "denied" || notifPerm === "unsupported"}
              className="inline-flex items-center gap-1.5"
              style={{ color: notifPerm === "granted" ? C.up : C.dim, background: "none", border: `1px solid ${C.line}`, borderRadius: 999, padding: "3px 10px", fontFamily: FS, fontSize: 11 }}>
              <Icon name="bell" size={12} /> {notifLabel}</button>
          </div>
        </header>

        {tab === "home" && renderHome()}
        {tab === "portfolio" && renderPortfolio()}
        {tab === "business" && renderBusiness()}
        {tab === "habits" && renderHabits()}
        {tab === "reminders" && renderReminders()}
      </div>

      <nav style={{ position: "fixed", left: 0, right: 0, bottom: 0, background: C.nav, borderTop: `1px solid ${C.line}`, backdropFilter: "blur(8px)" }}>
        <div className="mx-auto flex" style={{ maxWidth: 1040 }}>
          {tabs.map((t) => {
            const on = tab === t.id;
            return (
              <button key={t.id} onClick={() => { setTab(t.id); if (t.id !== "portfolio") setPortfolioView(null); }} className="flex-1 flex flex-col items-center gap-1"
                style={{ background: "none", border: "none", padding: "10px 4px 12px", color: on ? C.gold : C.faint }}>
                <Icon name={t.icon} size={20} strokeWidth={on ? 2.2 : 1.8} /><span style={{ fontSize: 10.5, fontFamily: FS }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
